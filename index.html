<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home-Plan Prototype</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="tools" role="toolbar" aria-label="Инструменты">
          <button id="tool-select" class="tool active" title="Выбрать" aria-label="Выбрать">↖</button>
          <button id="tool-wall" class="tool" title="Стена" aria-label="Стена">▭</button>
        </div>
      </header>

      <main class="workspace">
        <svg id="canvas"></svg>
      </main>

      <aside class="inspector">
        <h2>Инспектор</h2>

        <section>
          <h3>Сетка</h3>
          <label>Единицы
            <select id="grid-unit">
              <option value="cm" selected>см</option>
              <option value="mm">мм</option>
              <option value="inch">дюймы</option>
              <option value="m">м</option>
            </select>
          </label>
          <label>Шаг сетки
            <input id="grid-step" type="number" min="0.1" step="0.1" value="10" />
          </label>
          <label>Масштаб
            <input id="zoom" type="range" min="0.2" max="6" step="0.1" value="1" />
          </label>
        </section>

        <section id="selection-section">
          <h3 id="selection-title">Ничего не выбрано</h3>

          <div id="wall-fields" class="hidden">
            <label>Имя стены
              <input id="wall-name" type="text" />
            </label>
            <label>Ограничение
              <select id="wall-lock">
                <option value="none">Нет</option>
                <option value="horizontal">Горизонталь</option>
                <option value="vertical">Вертикаль</option>
              </select>
            </label>
            <label>Толщина (<span class="unit-label">см</span>)
              <input id="wall-thickness" type="number" min="0" step="0.1" value="20" />
            </label>
            <button id="delete-selected">Удалить стену</button>
          </div>

          <div id="node-fields" class="hidden">
            <p class="muted">Точка принадлежит стенам:</p>
            <ul id="node-wall-list"></ul>
          </div>
        </section>
      </aside>
    </div>

    <script src="app.js"></script>
  </body>
</html>
